services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: avtorend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avtorend"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: avtorend
      DB_USER: postgres
      DB_PASSWORD: "1234"
      JWT_SECRET: carsharing_super_secret_key_change_in_production
      JWT_EXPIRES_IN: 7d
      UPLOAD_PATH: ./uploads
      DATABASE_URL: postgres://postgres:1234@db:5432/avtorend
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "0.0.0.0:3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://${HOST_IP:-localhost}:3001/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "0.0.0.0:3000:3000"

volumes:
  postgres_data:
  uploads_data:
